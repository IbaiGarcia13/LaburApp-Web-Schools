<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ibai y Asier">
    <meta name="fecha" content="12-02-2026">
    <meta name="TFG" content="TFG - LaburApp">
    <meta name="keywords" content="libros, biblioteca, autores, literatura, lectura">
    <title>LaburApp</title>
    <link rel="shortcut icon" href="../IMAGENES/LaburApp-icono.png" type="image/x-icon">
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>
    <header>
        <img src="../IMAGENES/LaburApp-icono.png" alt="LaburApp Icono" class="icon">
        <h1>LaburApp</h1>
    </header>
    <main>
        <div id="login">
            <h2>Iniciar sesión</h2>
            <form method="post" id="formLogin">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" required><br><br>
                
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required><br><br>
                
                <button type="submit">Iniciar sesión</button>
                <p id="mensajeError" class="error"></p>
            </form><br><br>
            <p>¿No tienes una cuenta? <a href="register.html">Regístrate aquí</a></p>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 LaburApp. Todos los derechos reservados.</p>
    </footer>
    <script src="../JS/login.js"></script>
</body>
</html>
