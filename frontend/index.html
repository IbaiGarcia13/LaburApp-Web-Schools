<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ibai y Asier">
    <meta name="fecha" content="12-02-2026">
    <meta name="TFG" content="TFG - LaburApp">
    <meta name="keywords" content="libros, biblioteca, autores, literatura, lectura">
    <title>LaburApp - Inicio de Sesión</title>
    <link rel="shortcut icon" href="assets/img/icons/icono-Laburapp.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>
    <!-- ================= CABECERA DE INICIO ================= -->
    <header>
        <img class="icon" src="./assets/img/logo/LaburApp2-sin-fondo.png" alt="LaburApp Icono">
        <img class="logo-text" src="./assets/img/logo/LaburApp3-sin-fondo.png" alt="Texto LABURAPP">
    </header>
    <main>
        <!-- === SECCIÓN PROMOCIONAL DESCARTABLE / DESCARGAR APP === -->
        <section id="download_app">
            <img src="assets/img/Laburapp-ordenador.png" alt="Simbolo ordenador" class="ordenador">
            <div class="download-text">
                <h2>¡Descarga LaburApp ahora!</h2>
                <p>Descarga la aplicación y muevete de manera mas cómoda para ganar dinero fácil</p>
                <!-- Botón de descarga visual -->
                <button type="submit" id="descargar">
                    Descargar APP
                    <img src="assets/img/icons/icono-descargar.png" alt="descargar icon">
                </button>
            </div>
        </section>
        <!-- === SECCIÓN FORMULARIO DE ACCESO (LOGIN) === -->
        <!-- Formulario principal para acceder al Dashboard general o "perfil" del trabajador/cliente -->
        <section id="login">
            <h2>Iniciar sesión</h2>
            <!-- El id="formLogin" se vincula a login.js para interceptar el envío y validar localmente -->
            <form method="post" id="formLogin">
                <label for="username">Correo:</label>
                <input type="text" id="username" name="username" required><br><br>

                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required><br><br>

                <button href="/frontend/pages/principal.html" type="submit">Iniciar sesión</button>
                <p id="mensajeError" class="error"></p>
            </form><br><br>
            <p>¿No tienes una cuenta? <a href="pages/register.html">Regístrate aquí</a></p><br>
            <!-- Enlace opcional sin destino actual -->
            <a href="" id="olvidar">¿Olvidaste tu contraseña? </a>
        </section>
    </main>
    <script src="assets/js/login.js"></script>
    <script type="module" src="assets/js/app.js"></script>
</body>
<footer>
    <p>&copy; 2026 LaburApp - Todos los derechos reservados.</p>
</footer>

</html>
