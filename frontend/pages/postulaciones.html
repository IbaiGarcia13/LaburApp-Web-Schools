<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaburApp - Postulaciones</title>
    <link rel="shortcut icon" href="../assets/img/icons/icono-Laburapp.png" type="image/x-icon">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/postulaciones.css">
</head>

<body>

    <!-- ================= CABECERA SUPERIOR ================= -->
    <header>
        <div class="logo">
            <a href="principal.html">
                <img src="../assets/img/logo/LaburApp2.png" alt="Icono LaburApp">
            </a>
            <a href="principal.html">
                <img src="../assets/img/logo/LaburApp3.png" alt="Texto LABURAPP" class="logo-text">
            </a>
        </div>
        <div class="header-right">
            <nav>
                <ul>
                    <li><a href="usuarios.html">Usuarios</a></li>
                    <li><a href="trabajos.html">Trabajos</a></li>
                    <li><a href="mapa.html">Mapa</a></li>
                </ul>
            </nav>

            <div class="header-icons">
                <img src="../assets/img/Ibai.jpg" alt="Perfil" class="profile-toggle" id="profileBtn">

                <div class="profile-dropdown" id="profileDropdown">
                    <a href="perfil.html">
                        <img src="../assets/img/Ibai.jpg" alt="Avatar" class="dropdown-avatar">
                    </a>
                    <p class="dropdown-name">Ibai García</p>
                    <p class="dropdown-email">ibai@mail.com</p>
                    <div class="dropdown-footer">
                        <img src="../assets/img/icons/icono-cerrar-sesion.png" alt="Logout" style="width: 20px;">
                        <a href="../index.html">Cerrar Sesión</a>
                    </div>
                </div>

                <div class="hamburger" id="menuBtn">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <!-- ================= MENÚ LATERAL ================= -->
    <nav class="side-menu" id="sideMenu">
        <ul>
            <li><img src="../assets/img/icons/icono-perfil.png"><a href="perfil.html">Perfil</a></li>
            <li><img src="../assets/img/icons/icono-mis-tareas.png"><a href="mis-tareas.html">Mis Tareas</a></li>
            <li><img src="../assets/img/icons/icono-mis-trabajos.png"><a href="mis-trabajos.html">Mis Trabajos</a></li>
            <li><img src="../assets/img/icons/icono-postulaciones.png"><a href="postulaciones.html">Postulaciones</a>
            </li>
            <li><img src="../assets/img/icons/icono-mensajes.png"><a href="mensajes.html">Mensajes</a></li>
            <li><img src="../assets/img/icons/icono-suscripciones.png"><a href="suscripciones.html">Suscripciones</a>
            </li>
            <li><img src="../assets/img/icons/icono-ajustes.png"><a href="ajustes.html">Ajustes</a></li>
        </ul>
        <div class="side-menu-footer">
            <img src="../assets/img/icons/icono-cerrar-sesion.png"> <a href="../index.html">Cerrar Sesión</a>
        </div>
    </nav>

    <!-- ================= CONTENIDO PRINCIPAL ================= -->
    <main id="container">

        <!-- Título con icono, igual que el resto de páginas -->
        <h2 class="section-title">
            <img src="../assets/img/icons/icono-ajustes.png"
                style="width: 35px; vertical-align: middle; margin-right: 10px;" alt="">
            POSTULACIONES
        </h2>

        <!-- Layout de dos columnas -->
        <div class="postulaciones-layout">

            <!-- COLUMNA IZQUIERDA: Trabajos donde me he postulado -->
            <div class="col-trabajos">
                <h3 class="col-header">TRABAJOS</h3>
                <!-- Las tarjetas se generan dinámicamente por JS -->
                <div id="jobs-list"></div>
            </div>

            <!-- Separador visual vertical -->
            <div class="col-divider"></div>

            <!-- COLUMNA DERECHA: Usuarios postulados a mis tareas -->
            <div class="col-usuarios">
                <h3 class="col-header">USUARIOS</h3>
                <!-- Las tarjetas se generan dinámicamente por JS -->
                <div id="users-list"></div>
            </div>

        </div>

        <!-- Paginación centrada debajo de las dos columnas -->
        <div class="pagination">
            <button id="prev-page" class="pag-btn">
                <img src="../assets/img/icons/icono-flecha.png" alt="<" style="width: 20px; transform: rotate(180deg);">
            </button>
            <span id="page-info">1 - 1</span>
            <button id="next-page" class="pag-btn">
                <img src="../assets/img/icons/icono-flecha.png" alt=">" style="width: 20px;">
            </button>
        </div>
    </main>

    <script src="../assets/js/general.js"></script>
    <script type="module" src="../assets/js/postulaciones.js"></script>
</body>
<footer>
    <p>&copy; 2026 LaburApp - Todos los derechos reservados.</p>
</footer>

</html>
