<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaburApp - Registro</title>
    <link rel="shortcut icon" href="../assets/img/icons/icono-Laburapp.png" type="image/x-icon">
    <link rel="stylesheet" href="../assets/css/register.css">
</head>

<body>
    <header>
        <img class="icon" src="../assets/img/logo/LaburApp2-sin-fondo.png" alt="LaburApp Icono">
        <img class="logo-text" src="../assets/img/logo/LaburApp3-sin-fondo.png" alt="Texto LABURAPP">
    </header>
    <main>
        <section id="download_app">
            <img src="../assets/img/Laburapp-ordenador.png" alt="Simbolo ordenador" class="ordenador">
            <div class="download-text">
                <h2>¡Descarga LaburApp ahora!</h2>
                <p>Descarga la aplicación y muevete de manera mas cómoda para ganar dinero fácil</p>
                <button type="submit" id="descargar">
                    Descargar APP
                    <img src="../assets/img/icons/icono-descargar.png" alt="descargar icon">
                </button>
            </div>
        </section>
        <section id="login">
            <h2>Registrarse</h2>
            <form id="formRegister">
                <!-- Fase 1: Credenciales -->
                <div id="fase1">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required><br><br>

                    <label for="password">Contraseña:</label>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <input type="password" id="password" name="password" required>
                        <button type="button" id="togglePassword">👁️</button>
                    </div><br>

                    <label for="passwordRpt">Repite la contraseña:</label>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <input type="password" id="passwordRpt" name="passwordRpt" required>
                        <button type="button" id="togglePasswordRpt">👁️</button>
                    </div><br><br>

                    <button type="button" id="btnSiguiente">Siguiente</button>
                </div>

                <!-- Fase 2: Datos Personales (Oculto inicialmente) -->
                <div id="fase2" class="hidden">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" maxlength="30"><br><br>

                    <label for="apellidos">Apellidos:</label>
                    <input type="text" id="apellidos" name="apellidos" maxlength="70"><br><br>

                    <label for="fechaNac">Fecha de Nacimiento:</label>
                    <input type="date" id="fechaNac" name="fechaNac" required><br><br>

                    <label for="dni">DNI:</label>
                    <input type="text" id="dni" name="dni" maxlength="9"><br><br>

                    <div style="display: flex; gap: 10px;">
                        <button type="button" id="btnAtras">Atrás</button>
                        <button type="submit" id="btnRegistrarse">Registrarse</button>
                    </div>
                </div>

                <p id="registerError" class="error"></p>
                <p id="registerSuccess" style="color: green; font-weight: bold;"></p>
            </form><br><br>
            <p>¿Ya tienes una cuenta? <a href="../index.html">Inicia sesión aquí</a></p>
        </section>
    </main>

    <script type="module" src="../assets/js/register.js"></script>

</body>
<footer>
    <p>&copy; 2026 LaburApp - Todos los derechos reservados.</p>
</footer>

</html>
