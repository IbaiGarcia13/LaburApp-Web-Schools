<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaburApp - Chat</title>
    <link rel="shortcut icon" href="../assets/img/icons/icono-Laburapp.png" type="image/x-icon">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/chat.css">
</head>

<body>

    <header>
        <div class="logo">
            <a href="principal.html">
                <img src="../assets/img/logo/LaburApp2.png" alt="Icono LaburApp">
            </a>
            <a href="principal.html">
                <img src="../assets/img/logo/LaburApp3.png" alt="Texto LABURAPP" class="logo-text">
            </a>
        </div>
        <div class="header-right">
            <nav>
                <ul>
                    <li><a href="usuarios.html">Usuarios</a></li>
                    <li><a href="trabajos.html">Trabajos</a></li>
                    <li><a href="mapa.html">Mapa</a></li>
                </ul>
            </nav>

            <div class="header-icons">
                <img src="../assets/img/Ibai.jpg" alt="Perfil" class="profile-toggle" id="profileBtn">

                <div class="profile-dropdown" id="profileDropdown">
                    <a href="perfil.html">
                        <img src="../assets/img/Ibai.jpg" alt="Avatar" class="dropdown-avatar">
                    </a>
                    <p class="dropdown-name">Ibai García</p>
                    <p class="dropdown-email">ibai@mail.com</p>
                    <div class="dropdown-footer">
                        <img src="../assets/img/icons/icono-cerrar-sesion.png" alt="Logout" style="width: 20px;">
                        <a href="../index.html">Cerrar Sesión</a>
                    </div>
                </div>

                <div class="hamburger" id="menuBtn">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <nav class="side-menu" id="sideMenu">
        <ul>
            <li><img src="../assets/img/icons/icono-perfil.png"><a href="perfil.html">Perfil</a></li>
            <li><img src="../assets/img/icons/icono-mis-tareas.png"><a href="mis-tareas.html">Mis Tareas</a></li>
            <li><img src="../assets/img/icons/icono-mis-trabajos.png"><a href="mis-trabajos.html">Mis Trabajos</a></li>
            <li><img src="../assets/img/icons/icono-postulaciones.png"><a href="postulaciones.html">Postulaciones</a>
            </li>
            <li><img src="../assets/img/icons/icono-mensajes.png"><a href="mensajes.html">Mensajes</a></li>
            <li><img src="../assets/img/icons/icono-suscripciones.png"><a href="suscripciones.html">Suscripciones</a>
            </li>
            <li><img src="../assets/img/icons/icono-ajustes.png"><a href="ajustes.html">Ajustes</a></li>
        </ul>
        <div class="side-menu-footer">
            <img src="../assets/img/icons/icono-cerrar-sesion.png"> <a href="../index.html">Cerrar Sesión</a>
        </div>
    </nav>

    <main class="main-content chat-page">
        <div class="chat-wrapper">
            <div class="chat-header">
                <div class="chat-header-left">
                    <a href="mensajes.html" class="btn-back" id="btnBack">
                        <img src="../assets/img/icons/icono-flecha.png" alt="Volver">
                    </a>
                    <a href="#" class="chat-profile-link" id="headerProfileLinkImg">
                        <img src="../assets/img/avatar-defecto.png" alt="Otro Usuario" class="chat-other-avatar"
                            id="otherAvatar">
                    </a>
                    <a href="#" class="chat-profile-link" id="headerProfileLinkText">
                        <h3 id="otherName">Cargando...</h3>
                    </a>
                </div>
                <div class="chat-header-right">
                    <p id="jobTitle">Trabajo: Cargando...</p>
                    <div class="report-wrapper">
                        <img src="../assets/img/icons/icono-denunciar.png" alt="Denunciar" class="icon-report"
                            id="btnReport">
                        <div class="report-modal hidden" id="reportModal">
                            <a href="#" class="chat-profile-link" id="modalProfileLinkImg">
                                <img src="../assets/img/avatar-defecto.png" alt="Avatar Denuncia"
                                    class="report-modal-avatar" id="reportModalAvatar">
                            </a>
                            <a href="#" class="chat-profile-link" id="modalProfileLinkText">
                                <h4 id="reportModalName">Cargando...</h4>
                            </a>
                            <button class="btn-submit-report" id="btnSubmitReport">DENUNCIAR</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="messages" class="messages-container">
                <!-- Los mensajes se cargarán aquí -->
            </div>

            <form id="chat-form" class="chat-input-area">
                <div id="image-preview-container" class="hidden">
                    <img id="image-preview" src="" alt="Vista previa">
                    <button type="button" id="btn-remove-preview">&times;</button>
                </div>
                <div class="chat-input-row">
                    <input type="text" id="message-input" placeholder="Escribe aquí tu mensaje..." autocomplete="off">
                    <div class="chat-input-actions">
                        <button type="button" class="btn-action-icon" id="btnImage">
                            <img src="../assets/img/icons/icono-imagen.png" alt="Imagen">
                        </button>
                        <button type="button" class="btn-action-icon" id="btnCamera">
                            <img src="../assets/img/icons/icono-foto.png" alt="Cámara">
                        </button>
                        <button type="submit" id="btn-send" class="btn-send-icon">
                            <img src="../assets/img/icons/icono-flecha.png" alt="Enviar">
                        </button>
                    </div>
                </div>
                <!-- Input oculto para selección de imagen desde el explorador -->
                <input type="file" id="input-file-gallery" accept="image/*" style="display:none">
            </form>
        </div>
    </main>


    <!-- Modal: Cámara -->
    <div class="modal-overlay hidden" id="modalCamera">
        <div class="modal-content">
            <h3>Hacer una foto</h3>
            <video id="cameraStream" autoplay playsinline
                style="width:100%; border-radius:10px; max-height:300px; object-fit:cover; margin-bottom: 15px;"></video>
            <canvas id="cameraCanvas" style="display:none;"></canvas>
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="btnCancelCamera">Cancelar</button>
                <button class="modal-btn confirm" id="btnCapture">📸 Capturar</button>
            </div>
        </div>
    </div>

    <script type="module" src="../assets/js/general.js"></script>
    <script type="module" src="../assets/js/chat.js"></script>
</body>

</html>
