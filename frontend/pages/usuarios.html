<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaburApp - Usuarios</title>
    <link rel="shortcut icon" href="../assets/img/LaburApp-icono.png" type="image/x-icon">
    <link rel="stylesheet" href="../assets/css/usuarios.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="../assets/img/LaburApp-icono.png" alt="Logo LaburApp">
            <span>LABURAPP</span>
        </div>
        <div class="header-right">
            <nav>
                <ul>
                    <li><a href="usuarios.html" class="active">Usuarios</a></li>
                    <li><a href="trabajos.html">Trabajos</a></li>
                    <li><a href="mapa.html">Mapa</a></li>
                </ul>
            </nav>
            <div class="header-icons">
                <img src="../assets/img/Ibai.jpg" alt="Perfil" class="profile-icon">

                <div class="profile-dropdown">
                    <img src="../assets/img/Ibai.jpg" class="dropdown-avatar">
                    <p class="dropdown-name">Ibai</p>
                    <p class="dropdown-email">ibai@mail.com</p>
                    <button class="logout-btn">Cerrar Sesión</button>
                </div>

                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <main id="container">
        <section id="content">
            <h2 class="section-title">USUARIOS: Todos</h2>
            <div id="users-list"></div>

            <div class="pagination">
                <button id="prev-page" class="pag-btn">&lt;</button>
                <span id="page-info">1 - 4</span>
                <button id="next-page" class="pag-btn">&gt;</button>
            </div>
        </section>

        <aside id="sidebar">
            <div class="filter-box">
                <h3>FILTRAR</h3>
                <form id="filter-form">
                    <div class="filter-group">
                        <label>Categoría:</label>
                        <select id="filter-category">
                            <option value="todas">Todas</option>
                            <option value="informatica">Informática</option>
                            <option value="mascotas">Mascotas</option>
                            <option value="jardineria">Jardinería</option>
                            <option value="carpinteria">Carpintería</option>
                            <option value="limpieza">Limpieza</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Nivel:</label>
                        <input type="number" id="filter-level" value="1" min="1" max="10">
                    </div>

                    <div class="filter-group">
                        <label class="group-label">Valoración media:</label>
                        <div class="range-container">
                            <div class="input-unit">
                                <span>Desde</span>
                                <input type="number" id="val-min" step="0.1" value="0.0" min="0" max="5">
                            </div>
                            <div class="input-unit">
                                <span>Hasta</span>
                                <input type="number" id="val-max" step="0.1" value="5.0" min="0" max="5">
                            </div>
                        </div>
                    </div>

                    <button type="button" id="update-btn">ACTUALIZAR</button>
                </form>
            </div>
        </aside>
    </main>

    <script src="../assets/js/usuarios.js"></script>
</body>
</html>
