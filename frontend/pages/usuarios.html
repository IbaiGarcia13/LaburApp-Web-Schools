<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaburApp - Usuarios</title>
    <link rel="shortcut icon" href="../assets/img/icons/icono-Laburapp.png" type="image/x-icon">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/usuarios.css">
</head>

<body>

    <!-- ================= BARRA SUPERIOR (NAV) ================= -->
    <header>
        <div class="logo">
            <a href="principal.html">
                <img src="../assets/img/logo/LaburApp2.png" alt="Icono LaburApp">
            </a>
            <a href="principal.html">
                <img src="../assets/img/logo/LaburApp3.png" alt="Texto LABURAPP" class="logo-text">
            </a>
        </div>
        <div class="header-right">
            <nav>
                <ul>
                    <li><a href="usuarios.html">Usuarios</a></li>
                    <li><a href="trabajos.html">Trabajos</a></li>
                    <li><a href="mapa.html">Mapa</a></li>
                </ul>
            </nav>

            <div class="header-icons">
                <img src="../assets/img/Ibai.jpg" alt="Perfil" class="profile-toggle" id="profileBtn">

                <div class="profile-dropdown" id="profileDropdown">
                    <a href="perfil.html">
                        <img src="../assets/img/Ibai.jpg" alt="Avatar" class="dropdown-avatar">
                    </a>
                    <p class="dropdown-name">Ibai García</p>
                    <p class="dropdown-email">ibai@mail.com</p>
                    <div class="dropdown-footer">
                        <img src="../assets/img/icons/icono-cerrar-sesion.png" alt="Logout" style="width: 20px;">
                        <a href="../index.html">Cerrar Sesión</a>
                    </div>
                </div>

                <div class="hamburger" id="menuBtn">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <!-- ================= MENÚ LATERAL (DESPLEGABLE EN MÓVILES) ================= -->
    <nav class="side-menu" id="sideMenu">
        <ul>
            <li><img src="../assets/img/icons/icono-perfil.png"><a href="perfil.html">Perfil</a></li>
            <li><img src="../assets/img/icons/icono-mis-tareas.png"><a href="mis-tareas.html">Mis Tareas</a></li>
            <li><img src="../assets/img/icons/icono-mis-trabajos.png"><a href="mis-trabajos.html">Mis Trabajos</a></li>
            <li><img src="../assets/img/icons/icono-postulaciones.png"><a href="postulaciones.html">Postulaciones</a>
            </li>
            <li><img src="../assets/img/icons/icono-mensajes.png"><a href="mensajes.html">Mensajes</a></li>
            <li><img src="../assets/img/icons/icono-suscripciones.png"><a href="suscripciones.html">Suscripciones</a>
            </li>
            <li><img src="../assets/img/icons/icono-ajustes.png"><a href="ajustes.html">Ajustes</a></li>
        </ul>
        <div class="side-menu-footer">
            <img src="../assets/img/icons/icono-cerrar-sesion.png"><a href="../index.html">Cerrar Sesión</a>
        </div>
    </nav>

    <!-- ================= CONTENIDO CENTRAL DE LA PÁGINA ================= -->
    <main id="container">
        <!-- SECCIÓN 1: Lista de resultados de usuarios renderizados por JavaScript -->
        <section id="content">
            <h2 class="section-title"><img src="../assets/img/icons/icono-ajustes.png"
                    style="width: 35px; vertical-align: middle; margin-right: 10px;" alt=""> USUARIOS: Todos</h2>
            <div id="users-list"></div>

            <div class="pagination">
                <button id="prev-page" class="pag-btn"><img src="../assets/img/icons/icono-flecha.png" alt="<"
                        style="width: 20px; transform: rotate(180deg);"></button>
                <span id="page-info">1 - 4</span>
                <button id="next-page" class="pag-btn"><img src="../assets/img/icons/icono-flecha.png" alt=">"
                        style="width: 20px;"></button>
            </div>
        </section>

        <!-- SECCIÓN 2: Barra lateral derecha con filtros de búsqueda -->
        <aside id="sidebar">
            <div class="filter-box">
                <h2 class="text-center" style="margin-bottom: 25px; text-align: center;">FILTRAR</h2>
                <form id="filter-form">
                    <div class="filter-group">
                        <label>Categoría:</label>
                        <select id="filter-category">
                            <option value="todas">Todas</option>
                            <option value="carpinteria">Carpintería</option>
                            <option value="construccion">Construcción/Reforma</option>
                            <option value="cuidado_personal">Cuidado personal</option>
                            <option value="diseno">Diseño</option>
                            <option value="evento">Evento</option>
                            <option value="gastronomia">Gastronomía</option>
                            <option value="informatica">Informática</option>
                            <option value="jardineria">Jardinería</option>
                            <option value="limpieza">Limpieza</option>
                            <option value="mascotas">Mascotas</option>
                            <option value="mudanza">Mudanza/Traslado</option>
                            <option value="otros">Otros</option>
                            <option value="transporte">Transporte</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Nivel:</label>
                        <input type="number" id="filter-level" value="1" min="1" max="50">
                    </div>
                    <div class="filter-group">
                        <label class="group-label">Valoración media:</label>
                        <div class="input-row">
                            <div class="input-half">
                                <span>Desde</span>
                                <input type="number" id="val-min" step="0.1" value="0.0" min="0" max="5">
                            </div>
                            <div class="input-half">
                                <span>Hasta</span>
                                <input type="number" id="val-max" step="0.1" value="5.0" min="0" max="5">
                            </div>
                        </div>
                    </div>

                    <button type="button" id="update-btn">ACTUALIZAR</button>
                </form>
            </div>
        </aside>
    </main>

    <script type="module" src="../assets/js/general.js"></script>
    <script type="module" src="../assets/js/usuarios.js"></script>
</body>
<footer>
    <p>&copy; 2026 LaburApp - Todos los derechos reservados.</p>
</footer>

</html>
