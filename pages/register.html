<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaburApp</title>
    <link rel="shortcut icon" href="/assets/img/LaburApp-icono.png" type="image/x-icon">
    <link rel="stylesheet" href="/assets/css/register.css">
</head>
<body>
    <header>
        <img src="/assets/img/LaburApp-icono.png" alt="LaburApp Icono" class="icon">
        <h1>LaburApp</h1>
    </header>
    <main>
        <section id="download_app">
            <img src="/assets/img/Ordenador.png" alt="Simbolo ordenador" class="ordenador">
            <div class="download-text">
                <h2>¡Descarga LaburApp ahora!</h2>
                <p>Descarga la aplicación y muevete de manera mas cómoda para ganar dinero fácil</p>
                <button type="submit" id="descargar">
                    Descargar APP
                    <img src="/assets/img/Descargar.png" alt="descargar icon">
                </button>
            </div>
        </section>
        <section id="login">
            <h2>Registrarse</h2>
            <form action="/register" method="post">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" required><br><br>
                
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required><br><br>

                <label for="password">Repite la contraseña:</label><input type="password" id="password2" name="password2" required><br><br>
                
                <button type="submit">Registrarse</button>
            </form><br><br><p>¿Ya tienes una cuenta? <a href="/index.html">Inicia sesión aquí</a></p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 LaburApp. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
